apiVersion: apps/v1
kind: Deployment
metadata:
  name: smp-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smp
  template:
    metadata:
      labels:
        app: smp
    spec:
      containers:
      - name: smp-app
        image: dinakarant/student-management:latest
        imagePullPolicy: Always
        command: ["/bin/sh"]
        args: ["/app/start.sh"]
        ports:
        - containerPort: 8000
        env:
        - name: PYTHONPATH
          value: "/app"
        - name: DEBUG
          value: "False"
        - name: DB_PORT_VALUE
          value: "3306"
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: smp-db-secrets
              key: secret_key
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: smp-db-secrets
              key: name
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: smp-db-secrets
              key: user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: smp-db-secrets
              key: password
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: smp-db-secrets
              key: host
---
apiVersion: v1
kind: Service
metadata:
  name: smp-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
  selector:
    app: smp
