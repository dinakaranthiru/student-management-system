name: Django CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Tests
      run: |
        python manage.py test students

  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: ACR Login
      uses: azure/docker-login@v1
      with:
        login-server: ${{ secrets.ACR_NAME }}.azurecr.io
        username: ${{ secrets.ACR_NAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.ACR_NAME }}.azurecr.io/student-management:${{ github.sha }}
          ${{ secrets.ACR_NAME }}.azurecr.io/student-management:latest

    - name: Set AKS Context
      uses: azure/aks-set-context@v3
      with:
        resource-group: StudentManagement-RG
        cluster-name: ${{ secrets.CLUSTER_NAME }}

    - name: Deploy to Kubernetes
      uses: azure/k8s-deploy@v4
      with:
        manifests: |
          k8s/secrets.yaml
          k8s/mysql-k8s.yaml
          k8s/deployment.yaml
        images: |
          demostudent.azurecr.io/student-management:${{ github.sha }}
        force: true

    - name: Wait for rolling update
      run: kubectl rollout status deployment/smp-web --timeout=5m

    - name: Verify deployment
      run: |
        echo "Expected image SHA: ${{ github.sha }}"
        echo "Running pods:"
        kubectl get pods -l app=smp
        echo "Current images:"
        kubectl get pods -l app=smp -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.containers[*].image}{"\n"}{end}'

    - name: Check for errors
      if: failure()
      run: |
        kubectl describe pods -l app=smp
        kubectl logs -l app=smp --tail=100